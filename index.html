<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Full Stack | Bio</title>
  
  <link rel="stylesheet" type="text/css" href="styles.css"> 
  <link rel="stylesheet" href="./tilt-effect.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="icon" type="image/x-icon" href="./assets/favico/default.ico">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/vanilla-tilt@1.7.2/dist/vanilla-tilt.min.js"></script>
</head>
<body> <div id="terminal">
    <div id="terminal-header">
      <div id="terminal-buttons">
        <div class="terminal-button" id="close-button"></div>
        <div class="terminal-button" id="minimize-button"></div>
        <div class="terminal-button" id="maximize-button"></div>
      </div>
    </div>
    <div id="terminal-content">
      <p id="terminal-text"></p>
    </div>
  </div>

  <div id="video-background">
    <video autoplay muted loop id="myVideo">
      <source src="./assets/back/default.mp4" type="video/mp4">
      Your browser does not support HTML5 video.
    </video>
    <div id="audio-background">
      <div id="music-controls">
        <input type="range" id="volume-slider" min="0" max="100" value="50">
        <div id="progress-container">
          <div id="progress-bar"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="video-overlay"></div>

  <div id="blurred-box" class="tilt-element">
    <div style="position: relative; display: inline-block;">
      <img id="profile-picture" src="./assets/pfp/default.jpg" alt="Profile Picture">
      <img id="avatar-frame" src="" alt="Avatar Frame">
    </div>
    
    <p id="username-container" style="color: white; font-weight: bold; font-size: 32px; margin: 15px 0;">
      <span id="username">Full Stack</span>
      <span id="typing-cursor">|</span>
    </p>
    
    <div class="badges-container">
      <img src="./assets/badge/developer.png" alt="dev badge">
      <img src="./assets/badge/love.png" alt="heart badge">
      <img src="./assets/badge/music.png" alt="music badge">
      <img src="./assets/badge/verified.png" alt="verified badge">
    </div>

    <div class="lang-container">
      <img src="./assets/logo/csharp.png" alt="C#">
      <img src="./assets/logo/aspnet.png" alt="ASP.NET">
      <img src="./assets/logo/python.png" alt="Python">
      <img src="./assets/logo/django.png" alt="Django">
      <img src="./assets/logo/javascript.png" alt="JavaScript">
      <img src="./assets/logo/html.png" alt="HTML5">
      <img src="./assets/logo/css.png" alt="CSS3">
      <img src="./assets/logo/vscode.png" alt="VS Code">
    </div>

    <div class="user-description">
      <p style="color: white; margin: 0;">
        C# — 2 years of experience<br>
        Python — 1 year of experience<br>
        HTML, CSS — 4 months of experience<br>
        Javascript — 3 months of experience
      </p>
    </div>

    <div class="discord-widget">
      <div class="discord-content">
        <div class="discord-icon">
          <img id="discord-avatar" src="" alt="Discord Avatar" draggable="false" loading="lazy">
        </div>
        <div class="discord-meta">
          <b id="discord-username">Loading...</b>
          <div>
            <span id="discord-status-dot"></span>
            <span id="discord-status-text"></span>
          </div>
        </div>
      </div>
      <div class="discord-activity">
        <div id="discord-activity-info" class="hidden">
          <div id="discord-album-art"></div>
          <div class="discord-activity-content">
            <div id="discord-activity-name"></div>
            <div id="discord-activity-details"></div>
            <div id="discord-activity-state"></div>
          </div>
        </div>
        <div id="discord-no-activity">I'm not currently doing anything!</div>
      </div>
    </div>

    <div class="links"> 
      <a href="https://www.facebook.com/c0mplexisreal" target="_blank"><i class="fab fa-facebook"></i></a> 
      <a href="https://github.com/c0mplex07" target="_blank"><i class="fa-brands fa-github"></i></a> 
      <a href="https://www.tiktok.com/@c0mplex07" target="_blank"><i class="fa-brands fa-tiktok"></i></a> 
      <a href="https://x.com/c0mplex_vn" target="_blank"><i class="fa-brands fa-twitter"></i></a> 
      <a href="mailto:enou456xq@gmail.com" target="_blank"><i class="fa-brands fa-google mail"></i></a> 
      <a href="https://osu.ppy.sh/users/17125172" target="_blank"><i class="fa-brands fa-osu"></i></a> 
    </div>
  </div>
  
  <script src="./lanyard.js"></script>
  <script src="./discord.js"></script>
  <script src="./title.js"></script>
  <script src="./username-animation.js"></script>
  <script src="./tilt-effect.js"></script>
  <script src="./audio-visualizer.js"></script>
</body>
</html>
